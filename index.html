<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Robinhood NFT Holder Exporter (GoldRush)</title>
    <style>
        body { font-family: system-ui; max-width: 900px; margin: 40px auto; padding: 20px; background: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; min-height: 120px; }
        button { background: #0d6efd; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 16px; cursor: pointer; margin: 10px 5px 10px 0; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        .download-btn { background: #198754; }
        .log { background: #1a1a2e; color: #7dc8ff; padding: 15px; border-radius: 8px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.8; }
        .success { color: #7dffb3; }
        .error { color: #ff7d7d; }
        .badge { background: #ffc107; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .note { background: #fff3cd; padding: 12px; border-radius: 8px; margin: 15px 0; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏴‍☠️ Robinhood NFT Holder Exporter</h1>
    <p>Robinhood Chain-এর NFT কন্ট্রাক্টগুলো থেকে টপ ৫০০ হোল্ডার বের করুন</p>

    <div class="note">
        ⚠️ <strong>GoldRush API Key প্রয়োজন:</strong> <a href="https://www.covalenthq.com/platform/" target="_blank">Covalent এ ফ্রি API Key নিন</a> এবং নিচে বসান।
    </div>

    <label><strong>🔑 GoldRush API Key:</strong></label>
    <input id="apiKey" type="text" placeholder="cqt_rQ... আপনার API Key দিন" style="width:100%; padding:10px; border:2px solid #ddd; border-radius:8px; margin:8px 0;">

    <label><strong>📝 কন্ট্রাক্ট অ্যাড্রেসসমূহ:</strong></label>
    <textarea id="contractInput">0xf08c65564eb07d880021105489552080b08e4319
0x12449B9a29865621be166AAff04dC14A640b4119
0x603D1a631DA50034dB1e04E9E2308951e70af714
0x9Ec6C5b9f572A9B02138E553BC5F5882Da735F45
0xe3b34C4bb0f12C82143745EEe6A6Cf4E3154b1fa
0x539cdd042c2f3d93ebc5be7dfff0c79f3b4fabf0
0x2a70813bb118dfd28f1477ce03cf7c4399d8c826
0x68e5a6aaf2503940f0337243063ab8f4da6bedec
0x982fa5108a0861988627584afaf5a9f8f78d6d14
0x08dc7cb3f4ccc8eea782e2924d151e2130f22b28
0x745c261680aebabe4a0e0ab9e0a2e8a7aa756871</textarea>

    <button id="fetchBtn">🚀 হোল্ডার সংগ্রহ করুন</button>
    <button id="downloadBtn" class="download-btn" disabled>⬇️ CSV ডাউনলোড</button>
    <span id="counter" class="badge">📊 ০টি অ্যাড্রেস</span>

    <h3>📋 লাইভ লগ:</h3>
    <div id="log" class="log">⏳ প্রস্তুত... API Key এবং কন্ট্রাক্ট অ্যাড্রেস দিন।</div>
</div>

<script>
const logEl = document.getElementById('log');
const fetchBtn = document.getElementById('fetchBtn');
const downloadBtn = document.getElementById('downloadBtn');
const counterEl = document.getElementById('counter');
const contractInput = document.getElementById('contractInput');
const apiKeyInput = document.getElementById('apiKey');

let allData = [];
let isFetching = false;

function log(msg, type='info') {
    const cls = type === 'success' ? 'success' : type === 'error' ? 'error' : '';
    logEl.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    logEl.scrollTop = logEl.scrollHeight;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// GoldRush (Covalent) NFT Holders API
async function fetchHolders(contract, limit=500, apiKey) {
    // GoldRush NFT holders endpoint for Robinhood Chain
    const url = `https://api.covalenthq.com/v1/robinhood-mainnet/nft/${contract}/holders/?key=${apiKey}&limit=${Math.min(limit, 100)}`;
    
    try {
        const response = await fetch(url);
        if (!response.ok) {
            if (response.status === 401) throw new Error('API Key ইনভ্যালিড বা এক্সপায়ার্ড।');
            if (response.status === 429) throw new Error('রেট লিমিট! ২ সেকেন্ড অপেক্ষা করুন।');
            throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        
        if (data.error) throw new Error(data.error_message || data.error);
        
        // Covalent রেসপন্স ফরম্যাট: data.items[].address
        if (data.data && data.data.items) {
            return data.data.items.map(item => item.address).filter(a => a && a.startsWith('0x'));
        }
        return [];
    } catch (e) {
        log(`❌ ${contract.slice(0,10)}...: ${e.message}`, 'error');
        return [];
    }
}

async function fetchAll() {
    if (isFetching) return;
    
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { log('⚠️ দয়া করে GoldRush API Key দিন।', 'error'); return; }
    
    const raw = contractInput.value.trim();
    if (!raw) { log('⚠️ কন্ট্রাক্ট অ্যাড্রেস দিন।', 'error'); return; }
    
    const contracts = raw.split(/[\s,]+/).filter(a => /^0x[a-fA-F0-9]{40}$/i.test(a.trim()));
    if (contracts.length === 0) { log('⚠️ কোনো বৈধ অ্যাড্রেস পাওয়া যায়নি।', 'error'); return; }
    
    isFetching = true;
    fetchBtn.disabled = true;
    downloadBtn.disabled = true;
    allData = [];
    logEl.innerHTML = '';
    log(`🎯 ${contracts.length}টি কন্ট্রাক্ট প্রসেস করা হবে...`);
    
    let total = 0;
    for (let i=0; i<contracts.length; i++) {
        const c = contracts[i].trim();
        log(`⏳ [${i+1}/${contracts.length}] ${c.slice(0,10)}... থেকে সংগ্রহ...`);
        
        const holders = await fetchHolders(c, 500, apiKey);
        
        if (holders.length > 0) {
            holders.forEach(addr => allData.push({ contract: c, address: addr }));
            total += holders.length;
            log(`✅ ${holders.length}টি অ্যাড্রেস পাওয়া গেছে।`, 'success');
        } else {
            log(`⚠️ কোনো অ্যাড্রেস পাওয়া যায়নি।`, 'error');
        }
        
        if (i < contracts.length-1) await sleep(1500);
    }
    
    counterEl.textContent = `📊 ${total}টি অ্যাড্রেস`;
    log(`🎉 সম্পূর্ণ! মোট ${total}টি অ্যাড্রেস।`, 'success');
    if (total > 0) downloadBtn.disabled = false;
    isFetching = false;
    fetchBtn.disabled = false;
}

function downloadCSV() {
    if (allData.length === 0) return;
    let csv = 'Contract,Address\n';
    allData.forEach(d => csv += `"${d.contract}","${d.address}"\n`);
    const blob = new Blob([csv], {type: 'text/csv'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `robinhood_holders_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    log(`⬇️ CSV ডাউনলোড শুরু! (${allData.length}টি রো)`, 'success');
}

fetchBtn.addEventListener('click', fetchAll);
downloadBtn.addEventListener('click', downloadCSV);
</script>
</body>
</html>
